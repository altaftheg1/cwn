<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Archive – DUB</title>
  <meta name="description" content="Browse the complete archive of UAE news articles saved by TheDubaiBrief." />
  <script>
    (function () {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    /* ===== SHARED HEADER (matches main page) ===== */
    :root {
      --red: #C8102E;
      --red-dark: #9B0B22;
      --red-light: #f5e5e8;
      --cream: #F7F4EF;
      --ink: #1A1208;
      --ink-mid: #3D3328;
      --ink-light: #7A6E62;
      --border: #DDD8CF;
      --gold: #B8860B;
      --radius-lg: 8px;
      --radius-md: 6px;
      --shadow-soft: 0 2px 8px rgba(0, 0, 0, 0.08);
      --max-width: 1320px;
    }

    html.dark {
      background: #0A0A0A;
      color: #F0F0F0;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      overflow-x: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Utility bar */
    .shared-utility-bar {
      background: var(--red-dark);
      color: #fff;
      padding: 6px 24px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.15);
    }

    .shared-util-left {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .shared-util-left span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .shared-util-clock {
      font-family: 'Source Serif 4', serif;
      font-weight: 600;
    }

    .shared-util-right {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .shared-util-right a {
      color: #fff;
      text-decoration: none;
      transition: color .2s;
      font-size: 12px;
    }

    .shared-util-right a:hover {
      color: var(--gold);
    }

    .shared-live-visitors {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.85);
    }

    .shared-live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      animation: sharedLvPulse 2s ease-in-out infinite;
    }

    @keyframes sharedLvPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
      }

      50% {
        box-shadow: 0 0 0 4px rgba(74, 222, 128, 0);
      }
    }

    /* Main header */
    .shared-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--red);
      border-bottom: 1px solid rgba(0, 0, 0, 0.15);
      color: #fff;
    }

    .shared-header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .shared-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .shared-logo-boxes {
      display: flex;
      gap: 8px;
    }

    .shared-logo-box {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      background: var(--red);
      border: 2px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 2px #000;
    }

    .shared-logo-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .shared-logo-main {
      font-family: 'Source Serif 4', serif;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      line-height: 1;
    }

    .shared-logo-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      opacity: .9;
      color: #fff;
      line-height: 1;
    }

    .shared-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .shared-dark-toggle {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #fff;
      padding: 5px 9px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      min-width: 34px;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s;
    }

    .shared-dark-toggle:hover {
      border-color: rgba(255, 255, 255, 0.9);
    }

    /* Dark mode */
    html.dark .shared-utility-bar {
      background: var(--red-dark);
    }

    html.dark .shared-header {
      background: var(--red);
      border-bottom-color: rgba(0, 0, 0, 0.3);
    }

    /* Responsive */
    @media(max-width:768px) {
      .shared-utility-bar {
        display: none;
      }

      .shared-header-inner {
        padding: 0 16px;
        height: 56px;
      }

      .shared-logo-box {
        width: 36px;
        height: 36px;
        font-size: 15px;
      }

      .shared-logo-main {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="shared-util-right">
    <a href="/about.html">About</a>
    <a href="/sources.html">Sources</a>
    <a href="/contact.html">Contact</a>
  </div>
  </div>

  <!-- Main Header -->

  <!-- Early theme: prevents flash -->
  <script>
    (function () {
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
        document.addEventListener('DOMContentLoaded', function () {
          document.body && document.body.classList.add('dark');
        });
      }
    })();
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- Utility Bar -->
  <div class="shared-utility-bar">
    <div class="shared-util-left">
      <span><span class="shared-util-clock" id="sharedClock">00:00 GST</span></span>
      <span id="sharedDate">Loading...</span>
      <span>Dubai, UAE</span>
      <span class="shared-live-visitors" id="sharedLiveVisitors" title="People viewing TheDubaiBrief right now">
        <span class="shared-live-dot"></span>
        <span id="sharedVisitorCount">–</span> online
      </span>
    </div>
    <div class="shared-util-right">
      <a href="/about.html">About</a>
      <a href="/sources.html">Sources</a>
      <a href="/contact.html">Contact</a>
    </div>
  </div>

  <!-- Main Header -->
  <header class="shared-header">
    <div class="shared-header-inner">
      <a class="shared-brand" href="/uae-calm-uae-news.html">
        <div class="shared-logo-boxes">
          <div class="shared-logo-box">D</div>
          <div class="shared-logo-box">B</div>
          <div class="shared-logo-box">B</div>
        </div>
        <div class="shared-logo-text">
          <div class="shared-logo-main">TheDubaiBrief</div>
          <div class="shared-logo-sub">UAE Official Sources</div>
        </div>
      </a>
      <div class="shared-header-right">
        <button class="shared-dark-toggle" id="darkToggle" title="Toggle dark mode"></button>
      </div>
    </div>
  </header>

  <!-- Shared header JS: clock, date, live count, dark toggle -->
  <script>
    (function () {
      'use strict';
      // Clock
      function updateClock() {
        var now = new Date();
        var h = String(now.getHours()).padStart(2, '0');
        var m = String(now.getMinutes()).padStart(2, '0');
        var el = document.getElementById('sharedClock');
        if (el) el.textContent = h + ':' + m + ' GST';
      }
      updateClock();
      setInterval(updateClock, 1000);

      // Date
      function updateDate() {
        var now = new Date();
        var el = document.getElementById('sharedDate');
        if (el) el.textContent = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      }
      updateDate();

      // Live visitor count
      var sid = sessionStorage.getItem('cwn-sid');
      if (!sid) {
        sid = 'v' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        sessionStorage.setItem('cwn-sid', sid);
      }
      function pingVisitors() {
        fetch('/api/ping', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sid: sid }) })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (d) {
            var el = document.getElementById('sharedVisitorCount');
            if (el && d && typeof d.visitors === 'number') el.textContent = d.visitors.toLocaleString();
          }).catch(function () { });
      }
      pingVisitors();
      setInterval(pingVisitors, 20000);

      // Dark toggle
      var toggle = document.getElementById('darkToggle');
      if (toggle) {
        var isDark = document.documentElement.classList.contains('dark');
        toggle.textContent = isDark ? '☀' : '☾';
        toggle.addEventListener('click', function () {
          var dark = !document.documentElement.classList.contains('dark');
          document.documentElement.classList.toggle('dark', dark);
          document.body && document.body.classList.toggle('dark', dark);
          localStorage.setItem('theme', dark ? 'dark' : 'light');
          toggle.textContent = dark ? '☀' : '☾';
        });
      }
    })();
  </script>
  <div class="page-wrapper">

    <div class="archive-header">
      <h1>News Archive</h1>
      <p>Browse every article ever saved by TheDubaiBrief. Search, filter by date, category, or source.</p>
    </div>

    <div class="filters-card">
      <div class="filters-grid">
        <div class="filter-group" style="grid-column:1/-1">
          <label>Search</label>
          <input type="text" id="q" placeholder="Search headlines, summaries…" autocomplete="off" />
        </div>
        <div class="filter-group">
          <label>Category</label>
          <select id="category">
            <option value="">All categories</option>
            <option value="Sport"> Sport</option>
            <option value="World"> World</option>
            <option value="Safety"> Safety</option>
            <option value="Government"> Government</option>
            <option value="Transport"> Transport</option>
            <option value="Health"> Health</option>
            <option value="Education"> Education</option>
            <option value="Weather"> Weather</option>
            <option value="Business"> Business</option>
            <option value="Community"> Community</option>
            <option value="Lifestyle"> Lifestyle</option>
            <option value="Technology"> Technology</option>
            <option value="General"> General</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Source</label>
          <input type="text" id="source" placeholder="e.g. Gulf News" autocomplete="off" />
        </div>
        <div class="filter-group">
          <label>Date</label>
          <input type="date" id="date" />
        </div>
        <div class="filter-actions">
          <button class="btn-search" id="btnSearch" onclick="search(1)">Search</button>
          <button class="btn-clear" onclick="clearFilters()">Clear</button>
        </div>
      </div>
    </div>

    <div class="results-meta" id="resultsMeta" style="display:none"></div>

    <div id="articlesContainer">
      <div class="state-box">
        <div class="loading-spinner"></div>
        <p>Loading archive…</p>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>

  </div>

  <script>
    (function () {
      'use strict';

      let currentPage = 1;
      let totalArticles = 0;
      const PAGE_SIZE = 20;

      // Run initial load
      search(1);

      // Allow Enter key in inputs to trigger search
      ['q', 'source', 'date'].forEach(function (id) {
        document.getElementById(id).addEventListener('keydown', function (e) {
          if (e.key === 'Enter') search(1);
        });
      });
      document.getElementById('category').addEventListener('change', function () { search(1); });

      function getFilters() {
        return {
          q: document.getElementById('q').value.trim(),
          category: document.getElementById('category').value,
          source: document.getElementById('source').value.trim(),
          date: document.getElementById('date').value
        };
      }

      function clearFilters() {
        document.getElementById('q').value = '';
        document.getElementById('category').value = '';
        document.getElementById('source').value = '';
        document.getElementById('date').value = '';
        search(1);
      }

      function search(page) {
        currentPage = page;
        const f = getFilters();
        const params = new URLSearchParams({ page: String(page) });
        if (f.q) params.set('q', f.q);
        if (f.category) params.set('category', f.category);
        if (f.source) params.set('source', f.source);
        if (f.date) params.set('date', f.date);

        showLoading();

        fetch('/api/archive?' + params.toString())
          .then(function (r) { return r.json(); })
          .then(function (data) {
            totalArticles = data.total || 0;
            renderArticles(data.articles || []);
            renderMeta(totalArticles, page, data.articles ? data.articles.length : 0, f);
            renderPagination(totalArticles, page);
          })
          .catch(function (err) {
            console.error(err);
            showError();
          });
      }

      // Expose search globally for onclick
      window.search = search;
      window.clearFilters = clearFilters;

      function showLoading() {
        document.getElementById('articlesContainer').innerHTML =
          '<div class="state-box"><div class="loading-spinner"></div><p>Loading articles…</p></div>';
        document.getElementById('pagination').innerHTML = '';
        document.getElementById('resultsMeta').style.display = 'none';
      }

      function showError() {
        document.getElementById('articlesContainer').innerHTML =
          '<div class="state-box">' +
          '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
          '<strong>Something went wrong</strong><p>Could not load articles. Please try again.</p></div>';
      }

      function renderMeta(total, page, count, f) {
        const meta = document.getElementById('resultsMeta');
        if (total === 0) {
          meta.style.display = 'none';
          return;
        }
        const start = (page - 1) * PAGE_SIZE + 1;
        const end = Math.min(start + count - 1, total);
        let filterText = '';
        if (f.q) filterText += ' matching "<strong>' + escapeHtml(f.q) + '</strong>"';
        if (f.category) filterText += ' in <strong>' + escapeHtml(f.category) + '</strong>';
        if (f.source) filterText += ' from <strong>' + escapeHtml(f.source) + '</strong>';
        if (f.date) filterText += ' on <strong>' + escapeHtml(f.date) + '</strong>';
        meta.innerHTML = 'Showing <strong>' + start + '–' + end + '</strong> of <strong>' + total.toLocaleString() + '</strong> articles' + filterText;
        meta.style.display = 'flex';
      }

      function renderArticles(articles) {
        if (!articles.length) {
          document.getElementById('articlesContainer').innerHTML =
            '<div class="state-box">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
            '<strong>No articles found</strong><p>Try different search terms or filters.</p></div>';
          return;
        }

        const html = articles.map(function (a) {
          const headline = escapeHtml(a.calm_headline || a.original_title || 'Untitled');
          const summary = a.summary ? escapeHtml(a.summary) : '';
          const impact = a.resident_impact ? escapeHtml(a.resident_impact) : '';
          const source = a.source ? escapeHtml(a.source) : '';
          const category = a.category ? escapeHtml(a.category) : '';
          const dateStr = formatDate(a.published_at || a.created_at);
          const url = escapeHtml(a.url || '#');

          const imgHtml = a.image_url
            ? '<img class="arc-card-img" src="' + escapeHtml(a.image_url) + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=arc-card-img-placeholder>' + imgPlaceholderSvg() + '</div>\'">'
            : '<div class="arc-card-img-placeholder">' + imgPlaceholderSvg() + '</div>';

          return '<a class="arc-card" href="' + url + '" target="_blank" rel="noopener noreferrer">' +
            imgHtml +
            '<div class="arc-card-body">' +
            '<div class="arc-card-meta">' +
            (category ? '<span class="arc-badge">' + category + '</span>' : '') +
            (source ? '<span class="arc-source">' + source + '</span>' : '') +
            '<span class="arc-date">' + dateStr + '</span>' +
            '</div>' +
            '<div class="arc-headline">' + headline + '</div>' +
            (summary ? '<div class="arc-summary">' + summary + '</div>' : '') +
            (impact ? '<div class="arc-impact">' + impact + '</div>' : '') +
            '</div>' +
            '</a>';
        }).join('');

        document.getElementById('articlesContainer').innerHTML =
          '<div class="articles-grid">' + html + '</div>';
      }

      function renderPagination(total, page) {
        const totalPages = Math.ceil(total / PAGE_SIZE);
        const el = document.getElementById('pagination');
        if (totalPages <= 1) { el.innerHTML = ''; return; }

        let html = '';

        // Prev
        html += '<button class="page-btn" onclick="search(' + (page - 1) + ')" ' + (page <= 1 ? 'disabled' : '') + '>&#8592; Prev</button>';

        // Page numbers
        const pages = getPageNumbers(page, totalPages);
        pages.forEach(function (p) {
          if (p === '…') {
            html += '<span class="page-ellipsis">…</span>';
          } else {
            html += '<button class="page-btn' + (p === page ? ' active' : '') + '" onclick="search(' + p + ')">' + p + '</button>';
          }
        });

        // Next
        html += '<button class="page-btn" onclick="search(' + (page + 1) + ')" ' + (page >= totalPages ? 'disabled' : '') + '>Next &#8594;</button>';

        el.innerHTML = html;
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      function getPageNumbers(current, total) {
        if (total <= 7) return Array.from({ length: total }, function (_, i) { return i + 1; });
        const pages = [];
        pages.push(1);
        if (current > 3) pages.push('…');
        for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) pages.push(i);
        if (current < total - 2) pages.push('…');
        pages.push(total);
        return pages;
      }

      function formatDate(iso) {
        if (!iso) return '';
        try {
          const d = new Date(iso);
          return d.toLocaleDateString('en-AE', { day: 'numeric', month: 'short', year: 'numeric' });
        } catch (e) { return iso.slice(0, 10); }
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function imgPlaceholderSvg() {
        return '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>';
      }

    })();
  </script>
  <script>
    (function () {
      var toggle = document.getElementById('darkToggle');
      if (!toggle) return;
      function applyDark(dark) {
        document.documentElement.classList.toggle('dark', dark);
        document.body.classList.toggle('dark', dark);
        toggle.textContent = dark ? '☀' : '☾';
      }
      applyDark(localStorage.getItem('theme') === 'dark');
      toggle.addEventListener('click', function () {
        var dark = !document.body.classList.contains('dark');
        localStorage.setItem('theme', dark ? 'dark' : 'light');
        applyDark(dark);
      });
    }());
  </script>
</body>

</html>
