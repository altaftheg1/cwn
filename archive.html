<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Archive – TheDubaiBrief</title>
  <meta name="description" content="Browse the complete archive of UAE news articles saved by TheDubaiBrief." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@400;600&ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --red:#C8102E;
      --red-dark:#9B0B22;
      --red-light:#f5e5e8;
      --cream:#F7F4EF;
      --ink:#1A1208;
      --ink-mid:#3D3328;
      --ink-light:#7A6E62;
      --border:#DDD8CF;
      --gold:#B8860B;
      --radius-lg:8px;
      --radius-md:6px;
      --shadow-soft:0 2px 8px rgba(0,0,0,0.08);
      --max-width:1320px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    html{overflow-x:hidden;}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--cream);
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
    }
    img{max-width:100%;height:auto;}

    /* ── HEADER ── */
    header{
      background:var(--red);
      border-bottom:3px solid #000;
      color:#fff;
      position:sticky;top:0;z-index:100;
    }
    .header-inner{
      max-width:var(--max-width);
      margin:0 auto;
      padding:14px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-boxes{display:flex;gap:6px;}
    .logo-box{
      width:36px;height:36px;border-radius:5px;
      background:var(--red);border:2px solid #fff;
      display:flex;align-items:center;justify-content:center;
      font-family:'Playfair Display',serif;font-size:15px;font-weight:900;color:#fff;
    }
    .logo-text-main{
      font-family:'Source Serif 4',serif;font-size:13px;font-weight:600;color:#fff;line-height:1.2;
    }
    .logo-text-sub{font-family:'DM Sans',sans-serif;font-size:10px;opacity:.9;color:#fff;}
    nav.main-nav{display:flex;align-items:center;gap:20px;flex:1;justify-content:center;}
    nav.main-nav a{
      color:#fff;text-decoration:none;font-size:13px;font-weight:500;
      padding:4px 0 6px;border-bottom:3px solid transparent;transition:border-color .2s;
    }
    nav.main-nav a:hover,nav.main-nav a.active{border-bottom-color:#fff;}
    .dark-toggle{
      background:none;border:1px solid rgba(255,255,255,0.4);color:#fff;
      padding:5px 9px;border-radius:4px;font-size:16px;cursor:pointer;
      line-height:1;min-width:34px;min-height:34px;
      display:flex;align-items:center;justify-content:center;
    }
    .dark-toggle:hover{border-color:rgba(255,255,255,0.9);}
    /* Dark mode */
    body.dark{background:#0A0A0A;color:#F0F0F0;}
    body.dark header{background:#111111;border-bottom-color:#000;}
    body.dark .filters-card{background:#1A1A1A;border-color:#2A2A2A;}
    body.dark .filter-group input,body.dark .filter-group select{background:#0A0A0A;border-color:#2A2A2A;color:#F0F0F0;}
    body.dark .filter-group label{color:#888888;}
    body.dark .arc-card{background:#1A1A1A;border-color:#2A2A2A;}
    body.dark .arc-headline{color:#F0F0F0;}
    body.dark .arc-summary{color:#888888;}
    body.dark .arc-date,body.dark .arc-source{color:#888888;}
    body.dark .arc-impact{border-color:#2A2A2A;color:#888888;}
    body.dark .results-meta{color:#888888;}
    body.dark .results-meta strong{color:#F0F0F0;}
    body.dark .page-btn{background:#1A1A1A;border-color:#2A2A2A;color:#F0F0F0;}
    body.dark .page-btn:hover:not(:disabled){background:#2A2A2A;}
    body.dark .page-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
    body.dark .archive-header h1{color:#F0F0F0;}
    body.dark .archive-header p{color:#888888;}
    body.dark .state-box{color:#888888;}
    body.dark .btn-clear{color:#888888;border-color:#2A2A2A;}
    body.dark .btn-clear:hover{color:var(--red);border-color:var(--red);}

    /* ── PAGE WRAPPER ── */
    .page-wrapper{
      max-width:var(--max-width);
      margin:0 auto;
      padding:32px 24px 60px;
    }

    /* ── PAGE HEADER ── */
    .archive-header{margin-bottom:28px;}
    .archive-header h1{
      font-family:'Playfair Display',serif;
      font-size:2rem;font-weight:900;color:var(--ink);
      margin-bottom:6px;
    }
    .archive-header p{font-size:14px;color:var(--ink-light);}

    /* ── FILTERS ── */
    .filters-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:20px 24px;
      margin-bottom:28px;
      box-shadow:var(--shadow-soft);
    }
    .filters-grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr auto;
      gap:14px;
      align-items:end;
    }
    .filter-group{display:flex;flex-direction:column;gap:6px;}
    .filter-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-light);}
    .filter-group input,
    .filter-group select{
      background:var(--cream);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      padding:9px 12px;
      font-family:'DM Sans',sans-serif;
      font-size:13px;
      color:var(--ink);
      width:100%;
      transition:border-color .2s,box-shadow .2s;
    }
    .filter-group input:focus,
    .filter-group select:focus{
      outline:none;
      border-color:var(--red);
      box-shadow:0 0 0 3px rgba(200,16,46,.1);
    }
    .filter-group input::placeholder{color:var(--ink-light);}
    .btn-search{
      background:var(--red);
      color:#fff;
      border:none;
      border-radius:var(--radius-md);
      padding:9px 22px;
      font-family:'DM Sans',sans-serif;
      font-size:13px;font-weight:600;
      cursor:pointer;
      transition:background .2s;
      white-space:nowrap;
      height:38px;
    }
    .btn-search:hover{background:var(--red-dark);}
    .btn-clear{
      background:none;
      color:var(--ink-light);
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      padding:9px 14px;
      font-family:'DM Sans',sans-serif;
      font-size:12px;cursor:pointer;
      transition:color .2s,border-color .2s;
      height:38px;
      margin-left:8px;
    }
    .btn-clear:hover{color:var(--red);border-color:var(--red);}
    .filter-actions{display:flex;gap:0;align-items:center;}

    /* ── RESULTS META ── */
    .results-meta{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:18px;font-size:13px;color:var(--ink-light);
    }
    .results-meta strong{color:var(--ink);}

    /* ── ARTICLE GRID ── */
    .articles-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:20px;
      margin-bottom:36px;
    }
    .arc-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      overflow:hidden;
      box-shadow:var(--shadow-soft);
      display:flex;flex-direction:column;
      transition:box-shadow .2s,transform .2s;
      text-decoration:none;color:inherit;
    }
    .arc-card:hover{
      box-shadow:0 6px 20px rgba(0,0,0,.12);
      transform:translateY(-2px);
    }
    .arc-card-img{
      width:100%;height:160px;object-fit:cover;
      background:var(--border);display:block;
      flex-shrink:0;
    }
    .arc-card-img-placeholder{
      width:100%;height:160px;
      background:linear-gradient(135deg,#f0ebe3 0%,#e0d9cf 100%);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .arc-card-img-placeholder svg{opacity:.25;}
    .arc-card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:8px;}
    .arc-card-meta{
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    }
    .arc-badge{
      background:var(--red-light);
      color:var(--red-dark);
      font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
      padding:2px 7px;border-radius:3px;
    }
    .arc-source{
      font-size:10px;color:var(--ink-light);font-weight:500;text-transform:uppercase;letter-spacing:.05em;
    }
    .arc-date{font-size:10px;color:var(--ink-light);margin-left:auto;}
    .arc-headline{
      font-family:'Playfair Display',serif;
      font-size:15px;font-weight:700;line-height:1.35;
      color:var(--ink);flex:1;
    }
    .arc-summary{
      font-size:12.5px;line-height:1.55;color:var(--ink-mid);
      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
    }
    .arc-impact{
      font-size:11.5px;color:var(--ink-light);font-style:italic;
      border-left:2px solid var(--border);padding-left:8px;margin-top:2px;
    }

    /* ── PAGINATION ── */
    .pagination{
      display:flex;justify-content:center;align-items:center;gap:6px;
      flex-wrap:wrap;
    }
    .page-btn{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      padding:7px 13px;
      font-size:13px;font-family:'DM Sans',sans-serif;
      cursor:pointer;color:var(--ink);
      transition:background .15s,border-color .15s,color .15s;
      min-width:36px;text-align:center;
    }
    .page-btn:hover:not(:disabled){background:var(--cream);border-color:var(--ink-light);}
    .page-btn.active{background:var(--red);border-color:var(--red);color:#fff;font-weight:600;}
    .page-btn:disabled{opacity:.4;cursor:default;}
    .page-ellipsis{color:var(--ink-light);padding:0 4px;font-size:13px;}

    /* ── STATES ── */
    .state-box{
      text-align:center;padding:60px 20px;
      color:var(--ink-light);font-size:14px;
    }
    .state-box svg{margin-bottom:16px;opacity:.3;}
    .state-box p{margin-top:8px;font-size:13px;}

    .loading-spinner{
      display:inline-block;width:32px;height:32px;
      border:3px solid var(--border);border-top-color:var(--red);
      border-radius:50%;animation:spin .7s linear infinite;
      margin-bottom:16px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
      .header-inner{padding:12px 16px;}
      nav.main-nav{display:none;}
      .page-wrapper{padding:20px 16px 48px;}
      .archive-header h1{font-size:1.5rem;}
      .filters-grid{grid-template-columns:1fr 1fr;gap:10px;}
      .filter-group:first-child{grid-column:1/-1;}
      .filter-actions{grid-column:1/-1;}
      .articles-grid{grid-template-columns:1fr;}
    }
    @media(max-width:420px){
      .filters-grid{grid-template-columns:1fr;}
      .arc-card-img,.arc-card-img-placeholder{height:130px;}
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="brand">
      <div class="logo-boxes">
        <div class="logo-box">D</div>
        <div class="logo-box">B</div>
        <div class="logo-box">B</div>
      </div>
      <div>
        <div class="logo-text-main">TheDubaiBrief</div>
        <div class="logo-text-sub">UAE News</div>
      </div>
    </a>
    <nav class="main-nav">
      <a href="/">Home</a>
      <a href="/archive" class="active">Archive</a>
    </nav>
    <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
  </div>
</header>

<div class="page-wrapper">

  <div class="archive-header">
    <h1>News Archive</h1>
    <p>Browse every article ever saved by TheDubaiBrief. Search, filter by date, category, or source.</p>
  </div>

  <div class="filters-card">
    <div class="filters-grid">
      <div class="filter-group" style="grid-column:1/-1">
        <label>Search</label>
        <input type="text" id="q" placeholder="Search headlines, summaries…" autocomplete="off" />
      </div>
      <div class="filter-group">
        <label>Category</label>
        <select id="category">
          <option value="">All categories</option>
          <option value="Sport">⚽ Sport</option>
          <option value="World">🌍 World</option>
          <option value="Safety">🛡️ Safety</option>
          <option value="Government">🏛️ Government</option>
          <option value="Transport">✈️ Transport</option>
          <option value="Health">🏥 Health</option>
          <option value="Education">📚 Education</option>
          <option value="Weather">🌤️ Weather</option>
          <option value="Business">💰 Business</option>
          <option value="Community">👥 Community</option>
          <option value="Lifestyle">🎭 Lifestyle</option>
          <option value="Technology">💻 Technology</option>
          <option value="General">📰 General</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Source</label>
        <input type="text" id="source" placeholder="e.g. Gulf News" autocomplete="off" />
      </div>
      <div class="filter-group">
        <label>Date</label>
        <input type="date" id="date" />
      </div>
      <div class="filter-actions">
        <button class="btn-search" id="btnSearch" onclick="search(1)">Search</button>
        <button class="btn-clear" onclick="clearFilters()">Clear</button>
      </div>
    </div>
  </div>

  <div class="results-meta" id="resultsMeta" style="display:none"></div>

  <div id="articlesContainer">
    <div class="state-box">
      <div class="loading-spinner"></div>
      <p>Loading archive…</p>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>

</div>

<script>
(function(){
  'use strict';

  let currentPage = 1;
  let totalArticles = 0;
  const PAGE_SIZE = 20;

  // Run initial load
  search(1);

  // Allow Enter key in inputs to trigger search
  ['q','source','date'].forEach(function(id){
    document.getElementById(id).addEventListener('keydown', function(e){
      if(e.key === 'Enter') search(1);
    });
  });
  document.getElementById('category').addEventListener('change', function(){ search(1); });

  function getFilters(){
    return {
      q: document.getElementById('q').value.trim(),
      category: document.getElementById('category').value,
      source: document.getElementById('source').value.trim(),
      date: document.getElementById('date').value
    };
  }

  function clearFilters(){
    document.getElementById('q').value = '';
    document.getElementById('category').value = '';
    document.getElementById('source').value = '';
    document.getElementById('date').value = '';
    search(1);
  }

  function search(page){
    currentPage = page;
    const f = getFilters();
    const params = new URLSearchParams({ page: String(page) });
    if(f.q) params.set('q', f.q);
    if(f.category) params.set('category', f.category);
    if(f.source) params.set('source', f.source);
    if(f.date) params.set('date', f.date);

    showLoading();

    fetch('/api/archive?' + params.toString())
      .then(function(r){ return r.json(); })
      .then(function(data){
        totalArticles = data.total || 0;
        renderArticles(data.articles || []);
        renderMeta(totalArticles, page, data.articles ? data.articles.length : 0, f);
        renderPagination(totalArticles, page);
      })
      .catch(function(err){
        console.error(err);
        showError();
      });
  }

  // Expose search globally for onclick
  window.search = search;
  window.clearFilters = clearFilters;

  function showLoading(){
    document.getElementById('articlesContainer').innerHTML =
      '<div class="state-box"><div class="loading-spinner"></div><p>Loading articles…</p></div>';
    document.getElementById('pagination').innerHTML = '';
    document.getElementById('resultsMeta').style.display = 'none';
  }

  function showError(){
    document.getElementById('articlesContainer').innerHTML =
      '<div class="state-box">' +
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
      '<strong>Something went wrong</strong><p>Could not load articles. Please try again.</p></div>';
  }

  function renderMeta(total, page, count, f){
    const meta = document.getElementById('resultsMeta');
    if(total === 0){
      meta.style.display = 'none';
      return;
    }
    const start = (page - 1) * PAGE_SIZE + 1;
    const end = Math.min(start + count - 1, total);
    let filterText = '';
    if(f.q) filterText += ' matching "<strong>' + escapeHtml(f.q) + '</strong>"';
    if(f.category) filterText += ' in <strong>' + escapeHtml(f.category) + '</strong>';
    if(f.source) filterText += ' from <strong>' + escapeHtml(f.source) + '</strong>';
    if(f.date) filterText += ' on <strong>' + escapeHtml(f.date) + '</strong>';
    meta.innerHTML = 'Showing <strong>' + start + '–' + end + '</strong> of <strong>' + total.toLocaleString() + '</strong> articles' + filterText;
    meta.style.display = 'flex';
  }

  function renderArticles(articles){
    if(!articles.length){
      document.getElementById('articlesContainer').innerHTML =
        '<div class="state-box">' +
        '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
        '<strong>No articles found</strong><p>Try different search terms or filters.</p></div>';
      return;
    }

    const html = articles.map(function(a){
      const headline = escapeHtml(a.calm_headline || a.original_title || 'Untitled');
      const summary = a.summary ? escapeHtml(a.summary) : '';
      const impact = a.resident_impact ? escapeHtml(a.resident_impact) : '';
      const source = a.source ? escapeHtml(a.source) : '';
      const category = a.category ? escapeHtml(a.category) : '';
      const dateStr = formatDate(a.published_at || a.created_at);
      const url = escapeHtml(a.url || '#');

      const imgHtml = a.image_url
        ? '<img class="arc-card-img" src="' + escapeHtml(a.image_url) + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=arc-card-img-placeholder>' + imgPlaceholderSvg() + '</div>\'">'
        : '<div class="arc-card-img-placeholder">' + imgPlaceholderSvg() + '</div>';

      return '<a class="arc-card" href="' + url + '" target="_blank" rel="noopener noreferrer">' +
        imgHtml +
        '<div class="arc-card-body">' +
          '<div class="arc-card-meta">' +
            (category ? '<span class="arc-badge">' + category + '</span>' : '') +
            (source ? '<span class="arc-source">' + source + '</span>' : '') +
            '<span class="arc-date">' + dateStr + '</span>' +
          '</div>' +
          '<div class="arc-headline">' + headline + '</div>' +
          (summary ? '<div class="arc-summary">' + summary + '</div>' : '') +
          (impact ? '<div class="arc-impact">' + impact + '</div>' : '') +
        '</div>' +
      '</a>';
    }).join('');

    document.getElementById('articlesContainer').innerHTML =
      '<div class="articles-grid">' + html + '</div>';
  }

  function renderPagination(total, page){
    const totalPages = Math.ceil(total / PAGE_SIZE);
    const el = document.getElementById('pagination');
    if(totalPages <= 1){ el.innerHTML = ''; return; }

    let html = '';

    // Prev
    html += '<button class="page-btn" onclick="search(' + (page-1) + ')" ' + (page <= 1 ? 'disabled' : '') + '>&#8592; Prev</button>';

    // Page numbers
    const pages = getPageNumbers(page, totalPages);
    pages.forEach(function(p){
      if(p === '…'){
        html += '<span class="page-ellipsis">…</span>';
      } else {
        html += '<button class="page-btn' + (p === page ? ' active' : '') + '" onclick="search(' + p + ')">' + p + '</button>';
      }
    });

    // Next
    html += '<button class="page-btn" onclick="search(' + (page+1) + ')" ' + (page >= totalPages ? 'disabled' : '') + '>Next &#8594;</button>';

    el.innerHTML = html;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function getPageNumbers(current, total){
    if(total <= 7) return Array.from({length:total}, function(_,i){ return i+1; });
    const pages = [];
    pages.push(1);
    if(current > 3) pages.push('…');
    for(let i = Math.max(2, current-1); i <= Math.min(total-1, current+1); i++) pages.push(i);
    if(current < total - 2) pages.push('…');
    pages.push(total);
    return pages;
  }

  function formatDate(iso){
    if(!iso) return '';
    try{
      const d = new Date(iso);
      return d.toLocaleDateString('en-AE', { day:'numeric', month:'short', year:'numeric' });
    }catch(e){ return iso.slice(0,10); }
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  function imgPlaceholderSvg(){
    return '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>';
  }

})();
</script>
<script>
(function(){
  var toggle = document.getElementById('darkToggle');
  if(!toggle) return;
  function applyDark(dark){
    document.body.classList.toggle('dark', dark);
    toggle.textContent = dark ? '☀️' : '🌙';
  }
  applyDark(localStorage.getItem('theme') === 'dark');
  toggle.addEventListener('click', function(){
    var dark = !document.body.classList.contains('dark');
    localStorage.setItem('theme', dark ? 'dark' : 'light');
    applyDark(dark);
  });
}());
</script>
</body>
</html>
