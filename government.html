<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Government Announcements – TheDubaiBrief</title>
  <meta name="description" content="Official UAE government announcements from WAM, U.AE, Dubai Media Office, and Ministry of Foreign Affairs." />
  <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');}());</script>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/header.css" />
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────── */
    :root {
      --red: #C8102E;
      --cream: #F7F4EF;
      --ink: #1A1208;
      --ink-mid: #4A4035;
      --ink-light: #8A7E72;
      --border: #ECEAE5;
      --card-bg: #FFFFFF;
      --page-bg: #F4F1EC;
      --c-uaegov: #006400;
      --c-wam: #C8A84B;
      --c-dmo: #003F8A;
      --c-mofa: #8B0000;
      --max: 1100px;
      --radius-hero: 16px;
      --radius-card: 12px;
    }
    html.dark {
      --cream: #0D0D0D;
      --ink: #F0EDE8;
      --ink-mid: #B0A89E;
      --ink-light: #706860;
      --border: rgba(255,255,255,0.08);
      --card-bg: #1A1A1A;
      --page-bg: #111111;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--page-bg);
      color: var(--ink);
      padding-bottom: 100px;
    }

    /* ── Page hero banner ───────────────────────────────────────── */
    .page-banner {
      background: linear-gradient(160deg, #C8102E 0%, #9B0B22 55%, #6E0618 100%);
      padding: 52px 24px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .page-banner::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .banner-icon {
      width: 56px; height: 56px; margin: 0 auto 16px;
      background: rgba(255,255,255,0.12); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .banner-icon svg { width: 28px; height: 28px; stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .banner-title {
      font-family: 'Playfair Display', serif;
      font-size: 36px; font-weight: 700; color: #fff;
      margin-bottom: 10px; line-height: 1.2;
    }
    .banner-sub {
      font-size: 16px; color: rgba(255,255,255,0.8);
      margin-bottom: 28px; line-height: 1.6;
    }
    .banner-badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .banner-badge {
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 6px 16px;
      font-size: 12px; font-weight: 700; color: #fff;
      letter-spacing: 0.01em;
    }
    .bb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Refresh bar ────────────────────────────────────────────── */
    .refresh-bar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .refresh-bar-inner {
      max-width: var(--max); margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0;
    }
    .refresh-status {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--ink-light); font-weight: 500;
    }
    .refresh-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
      animation: rdot 2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes rdot { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.7)} 50%{box-shadow:0 0 0 4px rgba(34,197,94,0)} }
    .refresh-count { font-size: 12px; color: var(--ink-light); }

    /* ── Filter pills ───────────────────────────────────────────── */
    .filter-bar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 60px; z-index: 100;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-pills {
      max-width: var(--max); margin: 0 auto;
      padding: 12px 24px; display: flex; gap: 8px; white-space: nowrap;
    }
    .filter-pill {
      padding: 7px 18px; border-radius: 999px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--border); background: transparent;
      color: var(--ink-mid); font-family: 'DM Sans', sans-serif;
      transition: all 0.18s ease; white-space: nowrap; flex-shrink: 0;
    }
    .filter-pill:hover { border-color: var(--red); color: var(--red); }
    .filter-pill.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── Main content wrap ──────────────────────────────────────── */
    .content-wrap { max-width: var(--max); margin: 0 auto; padding: 36px 24px 48px; }

    /* ── Hero card ──────────────────────────────────────────────── */
    .hero-card {
      background: var(--card-bg);
      border-radius: var(--radius-hero);
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.09);
      margin-bottom: 28px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
    }
    .hero-card:hover { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(0,0,0,0.14); }
    .hero-img-wrap { position: relative; height: 400px; overflow: hidden; background: #E8E4DF; }
    html.dark .hero-img-wrap { background: #2a2a2a; }
    .hero-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .hero-card:hover .hero-img { transform: scale(1.02); }
    .hero-img-placeholder {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: linear-gradient(135deg, #1a1208 0%, #2c1f0e 100%);
    }
    .hero-img-placeholder svg { width: 56px; height: 56px; stroke: rgba(255,255,255,0.3); fill: none; stroke-width: 1.5; }
    .hero-img-placeholder span { font-size: 13px; color: rgba(255,255,255,0.3); }
    .hero-source-badge {
      position: absolute; top: 0; left: 0;
      background: var(--red); color: #fff;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 7px 16px; border-radius: 0 0 10px 0;
    }
    .hero-body { padding: 28px 32px 32px; }
    .hero-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .source-tag {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 5px; color: #fff;
    }
    .source-tag-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.6); flex-shrink: 0; }
    .meta-sep { color: var(--ink-light); font-size: 13px; }
    .meta-time { font-size: 13px; color: var(--ink-light); }
    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: 32px; font-weight: 700; line-height: 1.3;
      color: var(--ink); margin-bottom: 14px;
    }
    .hero-summary {
      font-size: 16px; color: var(--ink-mid); line-height: 1.7;
      margin-bottom: 22px; max-width: 640px;
    }
    .read-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--red); color: #fff;
      font-size: 14px; font-weight: 600; text-decoration: none;
      padding: 11px 22px; border-radius: 8px;
      transition: background 0.18s, transform 0.15s;
    }
    .read-btn:hover { background: #9B0B22; transform: translateX(2px); }
    .read-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Two-column cards (stories 2 & 3) ──────────────────────── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
    .story-card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column;
    }
    .story-card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
    .story-img-wrap { height: 200px; overflow: hidden; background: #E8E4DF; flex-shrink: 0; }
    html.dark .story-img-wrap { background: #2a2a2a; }
    .story-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s; }
    .story-card:hover .story-img { transform: scale(1.04); }
    .story-img-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1208 0%, #2c1f0e 100%);
    }
    .story-img-placeholder svg { width: 36px; height: 36px; stroke: rgba(255,255,255,0.25); fill: none; stroke-width: 1.5; }
    .story-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .story-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .story-headline {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700; line-height: 1.35;
      color: var(--ink); margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .story-summary {
      font-size: 14px; color: var(--ink-mid); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      flex: 1; margin-bottom: 14px;
    }
    .story-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .story-time { font-size: 12px; color: var(--ink-light); }
    .story-read { font-size: 13px; font-weight: 600; color: var(--red); text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .story-read svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Timeline section ───────────────────────────────────────── */
    .timeline-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
    }
    .timeline-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-light); white-space: nowrap;
    }
    .timeline-rule { flex: 1; height: 1px; background: var(--border); }
    .timeline-list { display: flex; flex-direction: column; }
    .timeline-item {
      display: flex; gap: 16px; padding: 18px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.12s; border-radius: 6px;
    }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-item:hover { background: rgba(200,16,46,0.03); }
    html.dark .timeline-item:hover { background: rgba(255,255,255,0.03); }
    .timeline-thumb {
      width: 80px; height: 80px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0; background: #E8E4DF;
      align-self: flex-start;
    }
    html.dark .timeline-thumb { background: #2a2a2a; }
    .timeline-thumb-placeholder {
      width: 80px; height: 80px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1208 0%, #2c1f0e 100%);
    }
    .timeline-thumb-placeholder svg { width: 24px; height: 24px; stroke: rgba(255,255,255,0.25); fill: none; stroke-width: 1.5; }
    .timeline-content { flex: 1; min-width: 0; }
    .timeline-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .timeline-time { font-size: 11px; color: var(--ink-light); }
    .timeline-headline {
      font-size: 15px; font-weight: 700; color: var(--ink); line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .timeline-summary {
      font-size: 13px; color: var(--ink-mid); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .timeline-arrow {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: rgba(200,16,46,0.08); display: flex; align-items: center;
      justify-content: center; align-self: center; margin-left: 4px;
      transition: background 0.15s;
    }
    .timeline-item:hover .timeline-arrow { background: rgba(200,16,46,0.15); }
    .timeline-arrow svg { width: 14px; height: 14px; stroke: var(--red); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Empty + loading states ─────────────────────────────────── */
    .state-box {
      text-align: center; padding: 80px 24px; background: var(--card-bg);
      border-radius: var(--radius-card); border: 1px solid var(--border);
    }
    .state-icon { font-size: 48px; margin-bottom: 16px; }
    .state-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
    .state-sub { font-size: 15px; color: var(--ink-light); line-height: 1.6; margin-bottom: 24px; }
    .state-link { display: inline-flex; align-items: center; gap: 6px; color: var(--red); font-weight: 600; text-decoration: none; font-size: 14px; }
    .state-link:hover { text-decoration: underline; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .banner-title { font-size: 26px; }
      .banner-sub { font-size: 14px; }
      .page-banner { padding: 36px 20px 32px; }
      .hero-img-wrap { height: 240px; }
      .hero-body { padding: 20px; }
      .hero-headline { font-size: 22px; }
      .hero-summary { font-size: 14px; }
      .two-col { grid-template-columns: 1fr; }
      .content-wrap { padding: 24px 16px 48px; }
      .filter-pills { padding: 10px 16px; }
    }
    @media (max-width: 480px) {
      .hero-img-wrap { height: 200px; }
      .hero-headline { font-size: 19px; }
      .story-img-wrap { height: 160px; }
      .timeline-thumb, .timeline-thumb-placeholder { width: 64px; height: 64px; }
    }
  </style>
</head>
<body>
<script src="/js/shared-header.js"></script>

  <!-- Page banner -->
  <div class="page-banner">
    <div class="banner-icon">
      <svg viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg>
    </div>
    <h1 class="banner-title">Government Announcements</h1>
    <p class="banner-sub">Official news direct from UAE government sources</p>
    <div class="banner-badges">
      <span class="banner-badge"><span class="bb-dot" style="background:#4ade80"></span>UAE Gov</span>
      <span class="banner-badge"><span class="bb-dot" style="background:#C8A84B"></span>WAM</span>
      <span class="banner-badge"><span class="bb-dot" style="background:#60a5fa"></span>Dubai Media</span>
      <span class="banner-badge"><span class="bb-dot" style="background:#f87171"></span>MoFA</span>
    </div>
  </div>

  <!-- Refresh bar -->
  <div class="refresh-bar">
    <div class="refresh-bar-inner">
      <span class="refresh-status">
        <span class="refresh-dot"></span>
        <span id="refreshLabel">Loading…</span>
      </span>
      <span class="refresh-count" id="countLabel"></span>
    </div>
  </div>

  <!-- Filter pills -->
  <div class="filter-bar">
    <div class="filter-pills">
      <button class="filter-pill active" data-source="all">All</button>
      <button class="filter-pill" data-source="uaegov">UAE Gov</button>
      <button class="filter-pill" data-source="wam">WAM</button>
      <button class="filter-pill" data-source="dmo">Dubai Media</button>
      <button class="filter-pill" data-source="mofa">MoFA</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="content-wrap" id="mainContent">
    <div class="state-box">
      <div class="spinner"></div>
      <p style="color:var(--ink-light);font-size:15px;">Loading official announcements…</p>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ── Source config ────────────────────────────────────────────── */
    const SRCS = {
      uaegov: { label: 'UAE Government',             color: '#006400' },
      wam:    { label: 'Emirates News Agency (WAM)', color: '#C8A84B' },
      dmo:    { label: 'Dubai Media Office',         color: '#003F8A' },
      mofa:   { label: 'Ministry of Foreign Affairs',color: '#8B0000' },
    };
    const GOV_KEYS = Object.keys(SRCS);

    function srcColor(key, name) {
      if (key && SRCS[key]) return SRCS[key].color;
      const s = (name || '').toLowerCase();
      if (s.includes('wam') || s.includes('emirates news')) return '#C8A84B';
      if (s.includes('media office') || s.includes('dubai media'))  return '#003F8A';
      if (s.includes('foreign affairs') || s.includes('mofa'))       return '#8B0000';
      if (s.includes('uae gov') || s.includes('u.ae') || s.includes('portal')) return '#006400';
      return '#555';
    }

    function srcLabel(key, name) {
      if (key && SRCS[key]) return SRCS[key].label;
      return name || 'Official';
    }

    /* ── Helpers ─────────────────────────────────────────────────── */
    function timeAgo(ms) {
      if (!ms) return '';
      const d = Date.now() - ms;
      if (d < 60000)    return 'just now';
      if (d < 3600000)  return Math.floor(d / 60000) + 'm ago';
      if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
      return Math.floor(d / 86400000) + 'd ago';
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function sourceTagHtml(key, name) {
      const color = srcColor(key, name);
      const label = esc(srcLabel(key, name));
      return `<span class="source-tag" style="background:${color}"><span class="source-tag-dot"></span>${label}</span>`;
    }

    function imgOrPlaceholder(item, cls, phCls) {
      if (item.imageUrl && !item.imageUrl.startsWith('data:')) {
        return `<img class="${cls}" src="${esc(item.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="${phCls}" style="display:none;position:absolute;inset:0;">
                  <svg viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg>
                </div>`;
      }
      return `<div class="${phCls}">
                <svg viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg>
              </div>`;
    }

    /* ── Build HTML pieces ───────────────────────────────────────── */
    function buildHero(item) {
      const key   = (item.sourceKey || '').toLowerCase();
      const color = srcColor(key, item.sourceName);
      const label = esc(srcLabel(key, item.sourceName));
      const title = esc(item.calmTitle || item.title || 'Announcement');
      const sum   = esc(item.calmSummary || item.description || '');
      const age   = timeAgo(item.publishedAtMs || 0);
      const url   = esc(item.url || '#');
      const imgHtml = (item.imageUrl && !item.imageUrl.startsWith('data:'))
        ? `<img class="hero-img" src="${esc(item.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none';document.getElementById('hero-ph').style.display='flex'">`
        : '';
      const phHtml = `<div class="hero-img-placeholder" id="hero-ph" style="${imgHtml ? 'display:none' : ''}">
          <svg viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg>
          <span>Official UAE Government</span>
        </div>`;
      return `
        <div class="hero-card" onclick="window.open('${url}','_blank')">
          <div class="hero-img-wrap" style="position:relative">
            ${imgHtml}${phHtml}
            <span class="hero-source-badge">🏛️ OFFICIAL · ${label}</span>
          </div>
          <div class="hero-body">
            <div class="hero-meta">
              ${sourceTagHtml(key, item.sourceName)}
              <span class="meta-sep">·</span>
              <span class="meta-time">${age}</span>
            </div>
            <h2 class="hero-headline">${title}</h2>
            ${sum ? `<p class="hero-summary">${sum}</p>` : ''}
            <a class="read-btn" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              Read Official Statement
              <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </a>
          </div>
        </div>`;
    }

    function buildStoryCard(item) {
      const key   = (item.sourceKey || '').toLowerCase();
      const color = srcColor(key, item.sourceName);
      const title = esc(item.calmTitle || item.title || 'Announcement');
      const sum   = esc(item.calmSummary || item.description || '');
      const age   = timeAgo(item.publishedAtMs || 0);
      const url   = esc(item.url || '#');
      const imgHtml = (item.imageUrl && !item.imageUrl.startsWith('data:'))
        ? `<img class="story-img" src="${esc(item.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="story-img-placeholder"><svg viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg></div>`;
      return `
        <div class="story-card" onclick="window.open('${url}','_blank')">
          <div class="story-img-wrap">${imgHtml}</div>
          <div class="story-body">
            <div class="story-meta">
              ${sourceTagHtml(key, item.sourceName)}
            </div>
            <h3 class="story-headline">${title}</h3>
            ${sum ? `<p class="story-summary">${sum}</p>` : ''}
            <div class="story-footer">
              <span class="story-time">${age}</span>
              <a class="story-read" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                Read more
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </a>
            </div>
          </div>
        </div>`;
    }

    function buildTimelineItem(item) {
      const key   = (item.sourceKey || '').toLowerCase();
      const title = esc(item.calmTitle || item.title || 'Announcement');
      const sum   = esc(item.calmSummary || item.description || '');
      const age   = timeAgo(item.publishedAtMs || 0);
      const url   = esc(item.url || '#');
      const thumbHtml = (item.imageUrl && !item.imageUrl.startsWith('data:'))
        ? `<img class="timeline-thumb" src="${esc(item.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const phThumb = `<div class="timeline-thumb-placeholder" style="${thumbHtml ? 'display:none' : ''}">
          <svg viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg>
        </div>`;
      return `
        <div class="timeline-item" onclick="window.open('${url}','_blank')">
          ${thumbHtml}${phThumb}
          <div class="timeline-content">
            <div class="timeline-meta">
              ${sourceTagHtml(key, item.sourceName)}
              <span class="timeline-time">${age}</span>
            </div>
            <div class="timeline-headline">${title}</div>
            ${sum ? `<div class="timeline-summary">${sum}</div>` : ''}
          </div>
          <div class="timeline-arrow">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>`;
    }

    /* ── Render ──────────────────────────────────────────────────── */
    let allItems = [];
    let activeFilter = 'all';

    function render() {
      const wrap = document.getElementById('mainContent');
      if (!wrap) return;

      const items = activeFilter === 'all'
        ? allItems
        : allItems.filter(i => (i.sourceKey || '').toLowerCase() === activeFilter);

      // Update counters
      const countEl = document.getElementById('countLabel');
      if (countEl) countEl.textContent = items.length ? items.length + ' announcements' : '';

      if (!items.length) {
        wrap.innerHTML = `
          <div class="state-box">
            <div class="state-icon">🏛️</div>
            <div class="state-title">No announcements right now</div>
            <p class="state-sub">Check back soon for official UAE government updates.</p>
            <a class="state-link" href="/">View all UAE news →</a>
          </div>`;
        return;
      }

      const [hero, story2, story3, ...rest] = items;
      let html = buildHero(hero);

      if (story2 || story3) {
        html += '<div class="two-col">';
        if (story2) html += buildStoryCard(story2);
        if (story3) html += buildStoryCard(story3);
        html += '</div>';
      }

      if (rest.length) {
        html += `
          <div class="timeline-header">
            <span class="timeline-label">All Announcements</span>
            <span class="timeline-rule"></span>
          </div>
          <div class="timeline-list">${rest.map(buildTimelineItem).join('')}</div>`;
      }

      wrap.innerHTML = html;
    }

    /* ── Fetch ───────────────────────────────────────────────────── */
    async function loadFeed() {
      try {
        const data = await fetch('/api/government').then(r => r.json());
        const items = (data.items || [])
          .filter(i => GOV_KEYS.includes((i.sourceKey || '').toLowerCase()))
          .sort((a, b) => (b.publishedAtMs || 0) - (a.publishedAtMs || 0));
        allItems = items;

        const label = document.getElementById('refreshLabel');
        if (label) label.textContent = 'Updated just now';
        render();
      } catch {
        const label = document.getElementById('refreshLabel');
        if (label) label.textContent = 'Could not refresh';
        if (!allItems.length) {
          const wrap = document.getElementById('mainContent');
          if (wrap) wrap.innerHTML = `
            <div class="state-box">
              <div class="state-icon">🏛️</div>
              <div class="state-title">No announcements right now</div>
              <p class="state-sub">Could not load announcements. Please try again shortly.</p>
              <a class="state-link" href="/">View all UAE news →</a>
            </div>`;
        }
      }
    }

    loadFeed();
    setInterval(loadFeed, 5 * 60 * 1000);

    // Tick the "updated X min ago" label
    setInterval(function () {
      const label = document.getElementById('refreshLabel');
      if (label && label.textContent.startsWith('Updated just now')) {
        // keep it fresh-looking; full reload will update it
      }
    }, 60 * 1000);

    /* ── Filter pills ────────────────────────────────────────────── */
    document.querySelectorAll('.filter-pill').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.source;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });

  }());
  </script>
</body>
</html>
