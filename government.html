<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Government Announcements – TheDubaiBrief</title>
  <meta name="description" content="Official UAE government announcements from WAM, U.AE, Dubai Media Office, and Ministry of Foreign Affairs." />
  <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');}());</script>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/header.css" />
  <style>
    :root {
      --red: #C8102E;
      --accent: #006400;
      --cream: #F7F4EF;
      --ink: #1A1208;
      --ink-mid: #4A4035;
      --ink-light: #8A7E72;
      --border: #ECEAE5;
      --card-bg: #FFFFFF;
      --page-bg: #F4F1EC;
      --max: 1200px;
    }
    html.dark {
      --cream: #0D0D0D;
      --ink: #F0EDE8;
      --ink-mid: #B0A89E;
      --ink-light: #706860;
      --border: rgba(255,255,255,0.08);
      --card-bg: #1A1A1A;
      --page-bg: #111111;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--page-bg);
      color: var(--ink);
      padding-bottom: 100px;
    }

    /* ── Source strip ────────────────────────────────────────────── */
    .source-strip { background: var(--card-bg); border-bottom: 1px solid var(--border); }
    .source-strip-inner {
      max-width: var(--max); margin: 0 auto; padding: 10px 24px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .strip-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink-light); flex-shrink: 0; margin-right: 4px;
    }
    .strip-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
      color: var(--ink-mid); transition: all 0.15s; white-space: nowrap;
    }
    .strip-link:hover { border-color: var(--accent); color: var(--accent); }
    .strip-link svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .strip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Section bar ─────────────────────────────────────────────── */
    .section-bar {
      max-width: var(--max); margin: 28px auto 16px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-label {
      font-size: 11px; font-weight: 800; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--ink);
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; width: 120px; height: 1px; background: var(--border); }
    .section-meta { font-size: 12px; color: var(--ink-light); display: flex; align-items: center; gap: 10px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; animation: ldot 2s ease-in-out infinite; }
    @keyframes ldot { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.7)} 50%{box-shadow:0 0 0 3px rgba(34,197,94,0)} }
    .live-label { color: #22c55e; font-weight: 600; display: flex; align-items: center; gap: 5px; }

    /* ── Main grid ───────────────────────────────────────────────── */
    .content-wrap { max-width: var(--max); margin: 0 auto; padding: 0 24px 48px; }
    .top-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; margin-bottom: 32px; }

    /* ── Hero ────────────────────────────────────────────────────── */
    .hero-card {
      background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border);
      overflow: hidden; cursor: pointer; transition: box-shadow 0.2s;
    }
    .hero-card:hover { box-shadow: 0 6px 28px rgba(0,100,0,0.14); }
    .hero-img-wrap { height: 320px; overflow: hidden; background: #C8DBC8; position: relative; }
    html.dark .hero-img-wrap { background: #0a1a0a; }
    .hero-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s; }
    .hero-card:hover .hero-img { transform: scale(1.02); }
    .hero-ph {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #003300, #006400);
    }
    .hero-ph svg { width: 56px; height: 56px; stroke: rgba(255,255,255,0.25); fill: none; stroke-width: 1.5; }
    .hero-body { padding: 20px 24px 22px; }
    .hero-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .cat-badge {
      font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px; background: var(--accent); color: #fff;
    }
    .source-name { font-size: 13px; color: var(--ink-light); font-weight: 500; }
    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1.3; margin-bottom: 10px;
    }
    .hero-summary { font-size: 14px; color: var(--ink-mid); line-height: 1.65; margin-bottom: 16px; }
    .hero-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 14px; }
    .story-time { font-size: 12px; color: var(--ink-light); }
    .read-link { font-size: 13px; font-weight: 700; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .read-link:hover { text-decoration: underline; }

    /* ── Side cards ──────────────────────────────────────────────── */
    .side-col { display: flex; flex-direction: column; gap: 16px; }
    .side-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
      display: flex; gap: 14px; padding: 14px; cursor: pointer;
      transition: box-shadow 0.18s; text-decoration: none;
    }
    .side-card:hover { box-shadow: 0 4px 18px rgba(0,100,0,0.12); }
    .side-thumb-wrap { position: relative; flex-shrink: 0; }
    .side-thumb { width: 96px; height: 80px; border-radius: 7px; object-fit: cover; display: block; background: #C8DBC8; }
    html.dark .side-thumb { background: #0a1a0a; }
    .side-thumb-ph {
      width: 96px; height: 80px; border-radius: 7px;
      background: linear-gradient(135deg, #003300, #006400);
      display: flex; align-items: center; justify-content: center;
    }
    .side-thumb-ph svg { width: 24px; height: 24px; stroke: rgba(255,255,255,0.25); fill: none; stroke-width: 1.5; }
    .side-num {
      position: absolute; bottom: 4px; right: 4px;
      background: rgba(0,0,0,0.65); color: #fff; font-size: 11px; font-weight: 800;
      width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .side-body { flex: 1; min-width: 0; }
    .side-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .side-headline {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 700; color: var(--ink); line-height: 1.35; margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .side-time { font-size: 11px; color: var(--ink-light); }

    /* ── Timeline ────────────────────────────────────────────────── */
    .timeline-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .timeline-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-light); white-space: nowrap;
    }
    .timeline-rule { flex: 1; height: 1px; background: var(--border); }
    .timeline-list { display: flex; flex-direction: column; }
    .timeline-item {
      display: flex; gap: 14px; padding: 16px 0;
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background 0.12s; border-radius: 6px;
    }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-item:hover { background: rgba(0,100,0,0.03); }
    html.dark .timeline-item:hover { background: rgba(255,255,255,0.03); }
    .tl-thumb { width: 80px; height: 68px; border-radius: 7px; object-fit: cover; flex-shrink: 0; background: #C8DBC8; align-self: flex-start; }
    html.dark .tl-thumb { background: #0a1a0a; }
    .tl-thumb-ph {
      width: 80px; height: 68px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #003300, #006400);
    }
    .tl-thumb-ph svg { width: 22px; height: 22px; stroke: rgba(255,255,255,0.25); fill: none; stroke-width: 1.5; }
    .tl-content { flex: 1; min-width: 0; }
    .tl-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; flex-wrap: wrap; }
    .tl-badge {
      font-size: 9px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 3px; color: #fff;
    }
    .tl-time { font-size: 11px; color: var(--ink-light); }
    .tl-headline {
      font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .tl-arrow {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      background: rgba(0,100,0,0.08); display: flex; align-items: center;
      justify-content: center; align-self: center;
      transition: background 0.15s;
    }
    .timeline-item:hover .tl-arrow { background: rgba(0,100,0,0.16); }
    .tl-arrow svg { width: 13px; height: 13px; stroke: var(--accent); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Empty / loading ─────────────────────────────────────────── */
    .state-box {
      text-align: center; padding: 80px 24px; background: var(--card-bg);
      border-radius: 12px; border: 1px solid var(--border);
    }
    .state-icon { font-size: 48px; margin-bottom: 16px; }
    .state-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
    .state-sub { font-size: 15px; color: var(--ink-light); line-height: 1.6; margin-bottom: 24px; }
    .state-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-weight: 600; text-decoration: none; font-size: 14px; }
    .state-link:hover { text-decoration: underline; }
    .spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .top-grid { grid-template-columns: 1fr; }
      .side-col { flex-direction: row; overflow-x: auto; gap: 12px; padding-bottom: 4px; }
      .side-card { min-width: 260px; }
    }
    @media (max-width: 600px) {
      .hero-img-wrap { height: 220px; }
      .hero-headline { font-size: 21px; }
      .content-wrap { padding: 0 16px 48px; }
      .section-bar { padding: 0 16px; margin-top: 20px; }
      .source-strip-inner { padding: 8px 16px; }
    }
  </style>
</head>
<body>
<script src="/js/shared-header.js"></script>

  <!-- Source strip -->
  <div class="source-strip">
    <div class="source-strip-inner">
      <span class="strip-label">Sources</span>
      <a class="strip-link" href="https://u.ae" target="_blank" rel="noopener">
        <span class="strip-dot" style="background:#006400"></span>UAE Gov
        <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
      </a>
      <a class="strip-link" href="https://wam.ae" target="_blank" rel="noopener">
        <span class="strip-dot" style="background:#C8A84B"></span>WAM
        <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
      </a>
      <a class="strip-link" href="https://mediaoffice.ae" target="_blank" rel="noopener">
        <span class="strip-dot" style="background:#003F8A"></span>Dubai Media Office
        <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
      </a>
      <a class="strip-link" href="https://mofa.gov.ae" target="_blank" rel="noopener">
        <span class="strip-dot" style="background:#8B0000"></span>MoFA
        <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
      </a>
    </div>
  </div>

  <!-- Section bar -->
  <div class="section-bar">
    <span class="section-label">Government News</span>
    <span class="section-meta">
      <span class="live-label"><span class="live-dot"></span>Live</span>
      <span id="countLabel"></span>
    </span>
  </div>

  <!-- Main content -->
  <div class="content-wrap" id="mainContent">
    <div class="state-box">
      <div class="spinner"></div>
      <p style="color:var(--ink-light);font-size:15px;">Loading official announcements…</p>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ── Source config ─────────────────────────────────────────── */
    const SRCS = {
      uaegov: { label: 'UAE Gov',  color: '#006400' },
      wam:    { label: 'WAM',      color: '#C8A84B' },
      dmo:    { label: 'Dubai Media', color: '#003F8A' },
      mofa:   { label: 'MoFA',     color: '#8B0000' },
    };

    function srcInfo(item) {
      const key = (item.sourceKey || '').toLowerCase();
      if (SRCS[key]) return SRCS[key];
      const s = (item.sourceName || '').toLowerCase();
      if (s.includes('wam') || s.includes('emirates news')) return { label: 'WAM', color: '#C8A84B' };
      if (s.includes('media office') || s.includes('dubai media')) return { label: 'Dubai Media', color: '#003F8A' };
      if (s.includes('foreign affairs') || s.includes('mofa')) return { label: 'MoFA', color: '#8B0000' };
      return { label: item.sourceName || 'Official', color: '#006400' };
    }

    function timeAgo(ms) {
      if (!ms) return '';
      const d = Date.now() - ms;
      if (d < 60000)    return 'just now';
      if (d < 3600000)  return Math.floor(d / 60000) + 'm ago';
      if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
      return Math.floor(d / 86400000) + 'd ago';
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    const GOV_ICON = '<path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/>';

    /* ── Build hero ──────────────────────────────────────────────── */
    function buildHero(item) {
      const info  = srcInfo(item);
      const title = esc(item.calmTitle || item.title || 'Announcement');
      const sum   = esc(item.calmSummary || item.description || '');
      const age   = timeAgo(item.publishedAtMs || 0);
      const url   = esc(item.url || '#');
      const imgHtml = (item.imageUrl && !item.imageUrl.startsWith('data:'))
        ? `<img class="hero-img" src="${esc(item.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.removeProperty('display')">`
        : '';
      const phStyle = imgHtml ? 'display:none' : '';
      return `
        <div class="hero-card" onclick="window.open('${url}','_blank')">
          <div class="hero-img-wrap">
            ${imgHtml}
            <div class="hero-ph" style="${phStyle}"><svg viewBox="0 0 24 24">${GOV_ICON}</svg></div>
          </div>
          <div class="hero-body">
            <div class="hero-meta">
              <span class="cat-badge" style="background:${info.color}">${esc(info.label)}</span>
              <span class="source-name">${esc(item.sourceName || info.label)}</span>
            </div>
            <h2 class="hero-headline">${title}</h2>
            ${sum ? `<p class="hero-summary">${sum}</p>` : ''}
            <div class="hero-footer">
              <span class="story-time">${age}</span>
              <a class="read-link" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                Read more →
              </a>
            </div>
          </div>
        </div>`;
    }

    /* ── Build side card ─────────────────────────────────────────── */
    function buildSideCard(item, num) {
      const info  = srcInfo(item);
      const title = esc(item.calmTitle || item.title || 'Announcement');
      const age   = timeAgo(item.publishedAtMs || 0);
      const url   = esc(item.url || '#');
      const thumbHtml = (item.imageUrl && !item.imageUrl.startsWith('data:'))
        ? `<img class="side-thumb" src="${esc(item.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.removeProperty('display')">`
        : '';
      const phStyle = thumbHtml ? 'display:none' : '';
      return `
        <a class="side-card" href="${url}" target="_blank" rel="noopener">
          <div class="side-thumb-wrap">
            ${thumbHtml}
            <div class="side-thumb-ph" style="${phStyle}"><svg viewBox="0 0 24 24">${GOV_ICON}</svg></div>
            <span class="side-num">${num}</span>
          </div>
          <div class="side-body">
            <div class="side-meta">
              <span class="cat-badge" style="background:${info.color};font-size:9px">${esc(info.label)}</span>
            </div>
            <div class="side-headline">${title}</div>
            <div class="side-time">${age}</div>
          </div>
        </a>`;
    }

    /* ── Build timeline item ─────────────────────────────────────── */
    function buildTimeline(item) {
      const info  = srcInfo(item);
      const title = esc(item.calmTitle || item.title || 'Announcement');
      const age   = timeAgo(item.publishedAtMs || 0);
      const url   = esc(item.url || '#');
      const thumbHtml = (item.imageUrl && !item.imageUrl.startsWith('data:'))
        ? `<img class="tl-thumb" src="${esc(item.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.removeProperty('display')">`
        : '';
      const phStyle = thumbHtml ? 'display:none' : '';
      return `
        <div class="timeline-item" onclick="window.open('${url}','_blank')">
          ${thumbHtml}
          <div class="tl-thumb-ph" style="${phStyle}"><svg viewBox="0 0 24 24">${GOV_ICON}</svg></div>
          <div class="tl-content">
            <div class="tl-meta">
              <span class="tl-badge" style="background:${info.color}">${esc(info.label)}</span>
              <span class="tl-time">${age}</span>
            </div>
            <div class="tl-headline">${title}</div>
          </div>
          <div class="tl-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>`;
    }

    /* ── Render ──────────────────────────────────────────────────── */
    function render(items) {
      const wrap = document.getElementById('mainContent');
      if (!wrap) return;

      const countEl = document.getElementById('countLabel');
      if (countEl) countEl.textContent = items.length ? items.length + ' stories' : '';

      if (!items.length) {
        wrap.innerHTML = `
          <div class="state-box">
            <div class="state-icon">🏛️</div>
            <div class="state-title">No announcements right now</div>
            <p class="state-sub">Check back soon for official UAE government updates.</p>
            <a class="state-link" href="/">← Back to all news</a>
          </div>`;
        return;
      }

      const [hero, ...rest] = items;
      const sideItems = rest.slice(0, 3);
      const timelineItems = rest.slice(3);

      let html = `<div class="top-grid">`;
      html += buildHero(hero);
      html += `<div class="side-col">`;
      sideItems.forEach((it, i) => { html += buildSideCard(it, i + 2); });
      html += `</div></div>`;

      if (timelineItems.length) {
        html += `
          <div class="timeline-header">
            <span class="timeline-label">More Announcements</span>
            <span class="timeline-rule"></span>
          </div>
          <div class="timeline-list">${timelineItems.map(buildTimeline).join('')}</div>`;
      }

      wrap.innerHTML = html;
    }

    /* ── Fetch ───────────────────────────────────────────────────── */
    async function loadFeed() {
      try {
        const data = await fetch('/api/government').then(r => r.json());
        const items = (data.items || [])
          .sort((a, b) => (b.publishedAtMs || 0) - (a.publishedAtMs || 0));
        render(items);
      } catch {
        const wrap = document.getElementById('mainContent');
        if (wrap) wrap.innerHTML = `
          <div class="state-box">
            <div class="state-icon">🏛️</div>
            <div class="state-title">Could not load</div>
            <p class="state-sub">Please try again shortly.</p>
            <a class="state-link" href="/">← Back to all news</a>
          </div>`;
      }
    }

    loadFeed();
    setInterval(loadFeed, 5 * 60 * 1000);

  }());
  </script>
</body>
</html>
