<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#9B0B22"/>
    </linearGradient>
  </defs>

  <!-- Background square with rounded corners -->
  <rect x="0" y="0" width="120" height="120" rx="20" fill="url(#bg2)"/>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="120" height="6" rx="0" fill="#B8860B"/>
  <rect x="0" y="0" width="120" height="6" rx="20" fill="#B8860B"/>

  <!-- "D" monogram -->
  <text
    x="50%"
    y="72"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="-2"
  >D</text>

  <!-- Small gold underline -->
  <rect x="35" y="88" width="50" height="3" rx="2" fill="#B8860B"/>
</svg>
